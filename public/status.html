<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Leaderboard - Explain It To Grandma</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .status-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            text-shadow: var(--glow-green);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .leaderboard {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .leaderboard-header {
            display: grid;
            grid-template-columns: 50px 1fr 80px 80px 80px;
            gap: 10px;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 204, 102, 0.1) 100%);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .leaderboard-row {
            display: grid;
            grid-template-columns: 50px 1fr 80px 80px 80px;
            gap: 10px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .leaderboard-row:last-child {
            border-bottom: none;
        }

        .leaderboard-row:hover {
            background: var(--bg-input);
        }

        .rank {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

        .player-name-lb {
            color: var(--neon-lime);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
        }

        .score-cell {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .jargon-cell {
            font-size: 1rem;
            color: var(--neon-red);
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .stages-cell {
            font-size: 1rem;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-bar h1 {
            margin: 0;
            font-size: 2rem;
        }

        .back-link {
            color: var(--neon-green);
            text-decoration: none;
            font-size: 1rem;
            padding: 10px 20px;
            border: 1px solid var(--neon-green);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .refresh-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        @media (max-width: 600px) {
            .status-container {
                padding: 12px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 25px;
            }

            .stat-card {
                padding: 18px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .header-bar {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                margin-bottom: 20px;
            }

            .header-bar h1 {
                font-size: 1.5rem;
            }

            .leaderboard-header,
            .leaderboard-row {
                grid-template-columns: 40px 1fr 60px 60px 60px;
                gap: 5px;
                padding: 12px 10px;
            }

            .leaderboard-header {
                font-size: 0.65rem;
            }

            .player-name-lb {
                font-size: 0.85rem;
            }

            .score-cell {
                font-size: 1rem;
            }

            .back-link,
            .refresh-btn {
                padding: 10px 16px;
                min-height: 44px;
            }
        }

        @media (max-width: 380px) {
            .status-container {
                padding: 8px;
            }

            .header-bar h1 {
                font-size: 1.3rem;
            }

            .leaderboard-header,
            .leaderboard-row {
                grid-template-columns: 35px 1fr 50px 50px 50px;
                gap: 4px;
                padding: 10px 8px;
            }

            .player-name-lb {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="header-bar">
            <h1>Leaderboard</h1>
            <div>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
                <a href="/" class="back-link">Play Game</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-games">-</div>
                <div class="stat-label">Total Games</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="unique-players">-</div>
                <div class="stat-label">Unique Players</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="perfect-games">-</div>
                <div class="stat-label">Perfect Games</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-score">-</div>
                <div class="stat-label">Avg Score</div>
            </div>
        </div>

        <div id="content">
            <div class="loading">Loading leaderboard...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // Load stats
                const statsResponse = await fetch('/api/stats');
                const stats = await statsResponse.json();
                document.getElementById('total-games').textContent = stats.totalGames;
                document.getElementById('unique-players').textContent = stats.uniquePlayers;
                document.getElementById('perfect-games').textContent = stats.perfectGames;
                document.getElementById('avg-score').textContent = stats.avgScore;

                // Load leaderboard
                const lbResponse = await fetch('/api/leaderboard');
                const entries = await lbResponse.json();

                const content = document.getElementById('content');

                if (entries.length === 0) {
                    content.innerHTML = '<div class="no-data">No games played yet. Be the first!</div>';
                    return;
                }

                let html = `
                    <div class="leaderboard">
                        <div class="leaderboard-header">
                            <span>#</span>
                            <span>Player</span>
                            <span style="text-align:center">Score</span>
                            <span style="text-align:center">Jargon</span>
                            <span style="text-align:center">Stages</span>
                        </div>
                `;

                entries.forEach((entry, index) => {
                    const rank = index + 1;
                    const rankClass = rank <= 3 ? `rank-${rank}` : '';
                    html += `
                        <div class="leaderboard-row">
                            <span class="rank ${rankClass}">${rank}</span>
                            <span class="player-name-lb">${escapeHtml(entry.player_name)}</span>
                            <span class="score-cell">${entry.score}</span>
                            <span class="jargon-cell">${entry.jargon_hits}</span>
                            <span class="stages-cell">${entry.stages_completed}/5</span>
                        </div>
                    `;
                });

                html += '</div>';
                content.innerHTML = html;
            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('content').innerHTML = '<div class="no-data">Failed to load data. Please try again.</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
